services:
  mongodb:
    image: mongo:7
    container_name: feedback-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: feedback-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB=employee_feedback
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - APP_PORT=8000
    volumes:
      - chroma_data:/app/chroma_store
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
  chroma_data:
